<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Data Analyzer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
</head>

<body>
  <div class="container py-4">

    <!-- ===== Banner Image ===== -->
    <div class="banner-container text-center mb-3">
      <img src="images/dashboard.jpg" alt="Analytics Dashboard" class="dashboard-banner">
    </div>

    <!-- ===== Title ===== -->
    <h1 class="text-center text-primary mb-4">Smart Data Analyzer</h1>

    <!-- ===== Dashboard Cards ===== -->
    <div id="dashboardCards" class="row g-3 mb-4 d-none">
      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-muted">📊 Total Records</div>
            <div id="totalRecords" class="h4 mb-0">—</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-muted">📈 Numeric Columns</div>
            <div id="numericCols" class="h4 mb-0">—</div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-muted">📂 Object Columns</div>
            <div id="objectCols" class="h4 mb-0">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Upload Section ===== -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white">📂 Upload Section</div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <input class="form-control" type="file" id="fileInput" accept=".csv,.xlsx" />
          </div>
          <div class="col-md-4 d-grid">
            <button id="uploadBtn" class="btn btn-primary">
              <span id="uploadLabel">Upload & Analyze</span>
              <span id="uploadSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>
          </div>
        </div>
        <div id="message" class="mt-3"></div>
      </div>
    </div>

    <!-- ===== Data Preview ===== -->
    <div id="previewSection" class="card shadow-sm mb-4 d-none">
      <div class="card-header bg-success text-white">📊 Data Preview</div>
      <div class="card-body table-responsive">
        <table id="previewTable" class="table table-striped table-hover align-middle mb-0"></table>
      </div>
    </div>

    <!-- ===== Descriptive Stats ===== -->
    <div id="statsSection" class="card shadow-sm mb-4 d-none">
      <div class="card-header bg-secondary text-white">📈 Descriptive Statistics</div>
      <div class="card-body table-responsive">
        <table id="statsTable" class="table table-striped table-hover align-middle mb-0"></table>
      </div>
    </div>

    <!-- ===== Column Insights ===== -->
    <div id="insightsSection" class="card shadow-sm mb-4 d-none">
      <div class="card-header bg-info text-white">🧠 Column Insights</div>
      <div class="card-body">
        <div id="insightsContent"></div>
      </div>
    </div>

    <!-- ===== Outliers ===== -->
    <div id="outliersSection" class="card shadow-sm mb-4 d-none">
      <div class="card-header bg-warning text-dark">⚠ Outlier Results</div>
      <div class="card-body">
        <div id="outliersContent"></div>
        <hr />
        <div id="outlierInsights" class="small text-muted"></div>
      </div>
    </div>

    <!-- ===== Graphs ===== -->
    <div id="graphsSection" class="card shadow-sm mb-4 d-none">
      <div class="card-header bg-dark text-white">📉 Graphs</div>
      <div class="card-body" id="graphsContent"></div>
    </div>

    <!-- ===== Download Section ===== -->
    <div id="downloadSection" class="card shadow-sm d-none">
      <div class="card-header bg-light">📥 Download</div>
      <div class="card-body d-flex gap-2 flex-wrap">
        <a id="dlCsv" class="btn btn-outline-primary" target="_blank">Download CSV</a>
        <a id="dlExcel" class="btn btn-outline-primary" target="_blank">Download Excel</a>
        <a id="dlPdf" class="btn btn-outline-primary" target="_blank">Download PDF</a>
        <a id="dlDocx" class="btn btn-outline-primary" target="_blank">Download DOCX</a>
      </div>
    </div>

  </div>

  <script src="./script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
