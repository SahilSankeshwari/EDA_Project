{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Data Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{% static 'style.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-4 text-center text-primary">Smart Data Analyzer</h1>

      <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white"><span>📂</span> <span class="ms-1"></span>Upload Section</span></div>
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-8">
              <input class="form-control" type="file" id="fileInput" accept=".csv,.xlsx" />
            </div>
            <div class="col-md-4 d-grid">
              <button id="uploadBtn" class="btn btn-primary">
                <span id="uploadLabel">Upload & Analyze</span>
                <span id="uploadSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div id="message" class="mt-3"></div>
        </div>
      </div>

      <div id="previewSection" class="card shadow-sm mb-4 d-none">
        <div class="card-header bg-success text-white">Data Preview</div>
        <div class="card-body table-responsive">
          <table id="previewTable" class="table table-striped table-hover align-middle mb-0"></table>
        </div>
      </div>

      <div id="statsSection" class="card shadow-sm mb-4 d-none">
        <div class="card-header bg-secondary text-white"><img src="/static/images/stats.png" width="40" class="me-2" alt="stats"> Descriptive Statistics</div>
        <div class="card-body table-responsive">
          <table id="statsTable" class="table table-striped table-hover align-middle mb-0"></table>
        </div>
      </div>

      <div id="insightsSection" class="card shadow-sm mb-4 d-none">
        <div class="card-header bg-info text-white">Column Insights</div>
        <div class="card-body">
          <div id="insightsContent"></div>
        </div>
      </div>

      <div id="outliersSection" class="card shadow-sm mb-4 d-none">
        <div class="card-header bg-warning text-dark"><img src="/static/images/outlier.png" width="40" class="me-2" alt="outlier"> Outlier Results</div>
        <div class="card-body">
          <div id="outliersContent"></div>
        </div>
      </div>

      <div id="graphsSection" class="card shadow-sm mb-4 d-none">
        <div class="card-header bg-dark text-white"><img src="/static/images/graph.png" width="40" class="me-2" alt="graph"> Graphs</div>
        <div class="card-body" id="graphsContent"></div>
      </div>

      <div id="downloadSection" class="card shadow-sm d-none">
        <div class="card-header bg-light">Download</div>
        <div class="card-body d-flex gap-2 flex-wrap">
          <a id="dlCsv" class="btn btn-outline-primary" href="#" target="_blank">Download CSV</a>
          <a id="dlExcel" class="btn btn-outline-primary" href="#" target="_blank">Download Excel</a>
          <a id="dlPdf" class="btn btn-outline-primary" href="#" target="_blank">Download PDF</a>
          <a id="dlDocx" class="btn btn-outline-primary" href="#" target="_blank">Download DOCX</a>
        </div>
      </div>
    </div>

    <script src="{% static 'script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
  </html>
